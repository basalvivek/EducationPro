<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EducationPro — Reset Password</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center bg-light">

  <div class="card card-form p-5 bg-white" style="width:100%; max-width:440px;">
    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill fs-2 text-primary"></i>
      <h4 class="fw-bold mt-2">Set new password</h4>
      <p class="text-muted small">Must be 8–64 chars with upper, lower, digit &amp; special character.</p>
    </div>

    <div id="resetAlert" class="alert alert-danger d-none" role="alert"></div>

    <form id="resetForm" novalidate>
      <input type="hidden" id="tokenInput" th:value="${token}"/>

      <div class="mb-3">
        <label for="newPassword" class="form-label fw-semibold">New password</label>
        <input type="password" class="form-control form-control-lg" id="newPassword"
               placeholder="••••••••" required autocomplete="new-password"/>
      </div>

      <div class="mb-4">
        <label for="confirmPassword" class="form-label fw-semibold">Confirm password</label>
        <input type="password" class="form-control form-control-lg" id="confirmPassword"
               placeholder="••••••••" required autocomplete="new-password"/>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
        Update password
      </button>
    </form>

    <div class="text-center mt-3">
      <a th:href="@{/auth/login}" class="small text-muted">Back to login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/reset-password.js}"></script>
</body>
</html>
