<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EducationPro — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="reset-page">

  <div class="reset-card">

    <div class="reset-card__logo">
      <i class="bi bi-mortarboard-fill"></i>
    </div>

    <div class="text-center mb-4">
      <p class="mb-1" style="font-size:0.6875rem; font-weight:700; text-transform:uppercase;
                              letter-spacing:0.8px; color:#1d4ed8;">EduPro Admin</p>
      <h4 class="fw-bold mb-1" style="letter-spacing:-0.3px;">Set new password</h4>
      <p class="mb-0" style="color:var(--text-muted); font-size:0.875rem; line-height:1.5;">
        Must be 8–64 characters with uppercase, lowercase,<br/>digit &amp; special character.
      </p>
    </div>

    <div id="resetAlert" class="alert alert-danger d-none rounded-3 mb-3" role="alert"></div>

    <form id="resetForm" novalidate>
      <input type="hidden" id="tokenInput" th:value="${token}"/>

      <div class="mb-3">
        <label for="newPassword" class="form-label">New password</label>
        <div class="input-group">
          <input type="password" class="form-control form-control-lg" id="newPassword"
                 placeholder="••••••••" required autocomplete="new-password"/>
          <button type="button" class="btn btn-outline-secondary" id="toggleNew"
                  aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="eyeNew"></i>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label for="confirmPassword" class="form-label">Confirm password</label>
        <div class="input-group">
          <input type="password" class="form-control form-control-lg" id="confirmPassword"
                 placeholder="••••••••" required autocomplete="new-password"/>
          <button type="button" class="btn btn-outline-secondary" id="toggleConfirm"
                  aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="eyeConfirm"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold mb-3">
        Update password
      </button>
    </form>

    <div class="text-center">
      <a th:href="@{/auth/login}" class="text-decoration-none"
         style="font-size:0.875rem; color:var(--text-muted);">
        <i class="bi bi-arrow-left me-1" style="font-size:0.75rem;"></i>Back to sign in
      </a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleVis(inputId, iconId) {
      var pwd  = document.getElementById(inputId);
      var icon = document.getElementById(iconId);
      var show = pwd.type === 'password';
      pwd.type       = show ? 'text' : 'password';
      icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    }
    document.getElementById('toggleNew').addEventListener('click',
      function() { toggleVis('newPassword', 'eyeNew'); });
    document.getElementById('toggleConfirm').addEventListener('click',
      function() { toggleVis('confirmPassword', 'eyeConfirm'); });
  </script>
  <script th:src="@{/js/reset-password.js}"></script>
</body>
</html>
