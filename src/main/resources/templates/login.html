<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EduLearn — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --focus-ring: #185FA5; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F4F6FA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 820px;
      min-height: 480px;
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid #DDE3EE;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left-panel {
      width: 320px;
      flex-shrink: 0;
      padding: 28px 22px 22px;
      color: #fff;
      display: flex;
      flex-direction: column;
      background: linear-gradient(145deg, #1251c9, #0d6efd);
      transition: background 0.28s ease;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.2px;
      margin-bottom: 22px;
    }
    .brand .ti { font-size: 22px; }

    /* role grid */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 22px;
    }

    .role-card {
      padding: 11px 10px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .role-card:hover:not(.active) { background: rgba(255,255,255,0.13); }
    .role-card.active {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.18);
    }
    .rc-icon { font-size: 17px; color: #fff; margin-bottom: 3px; }
    .rc-name  { font-size: 11.5px; font-weight: 700; color: #fff; line-height: 1; }
    .rc-desc  { font-size: 10px; color: rgba(255,255,255,0.52); line-height: 1.35; margin-top: 1px; }

    /* portal info */
    .portal-info { flex: 1; min-height: 0; }
    #portalTitle {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 5px;
    }
    #portalSubtitle {
      font-size: 11.5px;
      color: rgba(255,255,255,0.7);
      line-height: 1.45;
      margin-bottom: 15px;
    }
    .feature-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 11.5px;
      color: rgba(255,255,255,0.65);
      line-height: 1.3;
    }
    .feature-item .ti { font-size: 14px; flex-shrink: 0; opacity: 0.85; }

    .left-footer {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-top: 20px;
    }

    /* ── Right panel ── */
    .right-panel {
      flex: 1;
      padding: 40px 38px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .role-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      margin-bottom: 18px;
      align-self: flex-start;
    }
    .role-chip .ti { font-size: 13px; }

    .form-title {
      font-size: 20px;
      font-weight: 500;
      color: #111827;
      margin-bottom: 3px;
      letter-spacing: -0.2px;
    }
    .form-subtitle {
      font-size: 13px;
      color: #64748B;
      margin-bottom: 22px;
    }

    /* inputs */
    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .input-wrap .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #9CA3AF;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 10px 38px 10px 36px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 13.5px;
      font-family: inherit;
      color: #111827;
      background: #FAFAFA;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .input-wrap input::placeholder { color: #C9D0DA; }
    .input-wrap input:focus {
      border-color: var(--focus-ring);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--focus-ring) 14%, transparent);
      background: #fff;
    }
    .input-wrap input.error-field { border-color: #EF4444; }
    .toggle-pass {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #9CA3AF;
      font-size: 16px;
      background: none;
      border: none;
      padding: 2px 4px;
      line-height: 1;
    }
    .toggle-pass:hover { color: #6B7280; }

    .field-error {
      display: none;
      font-size: 11.5px;
      color: #EF4444;
      margin-top: -8px;
      margin-bottom: 8px;
    }
    .field-error.show { display: block; }

    .form-row-forgot {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    .forgot-link {
      font-size: 12px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .forgot-link:hover { opacity: 0.75; }

    .error-banner {
      display: none;
      font-size: 12.5px;
      color: #DC2626;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 7px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }
    .error-banner.show { display: block; }

    .submit-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.12s;
      margin-bottom: 18px;
    }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11.5px;
      color: #CBD5E1;
      margin-bottom: 14px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }

    .sso-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      background: #fff;
      font-size: 13.5px;
      font-family: inherit;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      margin-bottom: 18px;
    }
    .sso-btn .ti { font-size: 16px; color: #6B7280; }
    .sso-btn:hover { background: #F9FAFB; }

    .footer-hint { font-size: 12px; color: #9CA3AF; text-align: center; }
    .footer-hint a { text-decoration: none; }
    .footer-hint a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .card { flex-direction: column; }
      .left-panel { width: 100%; }
      .right-panel { padding: 28px 22px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- ── LEFT PANEL ─────────────────────────────────────── -->
  <div class="left-panel" id="leftPanel">

    <div class="brand">
      <i class="ti ti-school"></i>
      <span>EduLearn</span>
    </div>

    <div class="role-grid" id="roleGrid">
      <div class="role-card active" data-role="ADMIN" onclick="switchRole('ADMIN')">
        <i class="ti ti-shield-check rc-icon"></i>
        <span class="rc-name">Admin</span>
        <span class="rc-desc">Manage<br>everything</span>
      </div>
      <div class="role-card" data-role="TEACHER" onclick="switchRole('TEACHER')">
        <i class="ti ti-book rc-icon"></i>
        <span class="rc-name">Teacher</span>
        <span class="rc-desc">Courses &amp;<br>exams</span>
      </div>
      <div class="role-card" data-role="STUDENT" onclick="switchRole('STUDENT')">
        <i class="ti ti-user-graduate rc-icon"></i>
        <span class="rc-name">Student</span>
        <span class="rc-desc">Learn &amp;<br>attempt</span>
      </div>
      <div class="role-card" data-role="PARENT" onclick="switchRole('PARENT')">
        <i class="ti ti-users rc-icon"></i>
        <span class="rc-name">Parent</span>
        <span class="rc-desc">Track<br>progress</span>
      </div>
    </div>

    <div class="portal-info">
      <h3 id="portalTitle">Admin Portal</h3>
      <p id="portalSubtitle"></p>
      <ul class="feature-list" id="featureList"></ul>
    </div>

    <div class="left-footer">EduLearn &middot; localhost:9090</div>
  </div>

  <!-- ── RIGHT PANEL ─────────────────────────────────────── -->
  <div class="right-panel">

    <div class="role-chip" id="roleChip"></div>

    <h2 class="form-title">Welcome back</h2>
    <p class="form-subtitle" id="formSubtitle"></p>

    <div class="error-banner" id="errorBanner"></div>

    <form id="loginForm" autocomplete="on" novalidate>

      <div class="input-wrap">
        <i class="ti ti-mail input-icon"></i>
        <input type="email" id="emailInput" name="email" autocomplete="email"
               placeholder="admin@localhost" required/>
      </div>
      <div class="field-error" id="emailErr">Please enter a valid email address.</div>

      <div class="input-wrap">
        <i class="ti ti-lock input-icon"></i>
        <input type="password" id="passwordInput" name="password"
               autocomplete="current-password" placeholder="Password" required/>
        <button type="button" class="toggle-pass" id="togglePass" aria-label="Toggle password">
          <i class="ti ti-eye" id="eyeIcon"></i>
        </button>
      </div>
      <div class="field-error" id="passErr">Password is required.</div>

      <div class="form-row-forgot">
        <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn"
              style="background: linear-gradient(135deg, #1251c9, #0d6efd)">
        <span id="btnLabel">Sign in as Admin</span>
      </button>

    </form>

    <div class="divider"><span>or</span></div>

    <button class="sso-btn" type="button" onclick="alert('SSO not configured for this portal.')">
      <i class="ti ti-building"></i>
      Continue with SSO
    </button>

    <p class="footer-hint" id="footerHint"></p>

  </div>
</div>

<script>
/* ── Role definitions ────────────────────────────── */
const ROLES = {
  ADMIN: {
    from: '#1251c9', to: '#0d6efd',
    chipBg: '#e8f0fe', chipColor: '#1251c9',
    icon: 'ti-shield-check', label: 'Administrator',
    portalTitle: 'Admin Portal',
    subtitle: 'Full control — users, courses, exams and reports',
    features: [
      ['ti-users',        'Manage teachers and students'],
      ['ti-chart-bar',    'Platform analytics and reports'],
      ['ti-circle-check', 'Approve and publish content'],
      ['ti-settings',     'System configuration'],
    ],
    formSub: 'Sign in to your admin account',
    placeholder: 'admin@educationpro.com',
    btnLabel: 'Sign in as Admin',
    accentColor: '#0d6efd',
    footerText: 'Need help?',
    footerLink: 'Contact IT support',
    footerHref: '#',
    redirect: '/admin/dashboard',
  },
  TEACHER: {
    from: '#085041', to: '#0F6E56',
    chipBg: '#E1F5EE', chipColor: '#085041',
    icon: 'ti-book', label: 'Teacher',
    portalTitle: 'Teacher Portal',
    subtitle: 'Create lessons, build exams, track students',
    features: [
      ['ti-book-2',           'Build courses and question banks'],
      ['ti-file-description', 'Create and submit exam papers'],
      ['ti-chart-line',       'Monitor student performance'],
      ['ti-calendar-event',   'Schedule lessons and exams'],
    ],
    formSub: 'Sign in to your teacher account',
    placeholder: 'teacher@school.edu',
    btnLabel: 'Sign in as Teacher',
    accentColor: '#0F6E56',
    footerText: 'First time here?',
    footerLink: 'Request access',
    footerHref: '#',
    redirect: '/teacher/dashboard',
  },
  STUDENT: {
    from: '#0e5a6e', to: '#0891b2',
    chipBg: '#E0F7FA', chipColor: '#0e5a6e',
    icon: 'ti-user-graduate', label: 'Student',
    portalTitle: 'Student Portal',
    subtitle: 'View exams, track results, study with AI',
    features: [
      ['ti-calendar-event', 'See upcoming exams'],
      ['ti-chart-bar',      'Track your results and scores'],
      ['ti-robot',          'Ask Me — AI study assistant'],
      ['ti-speakerphone',   'View school announcements'],
    ],
    formSub: 'Sign in to your student account',
    placeholder: 'student@school.edu',
    btnLabel: 'Sign in as Student',
    accentColor: '#0891b2',
    footerText: 'First time?',
    footerLink: 'Ask your teacher for access',
    footerHref: '#',
    redirect: '/student/dashboard.html',
  },
  PARENT: {
    from: '#3C3489', to: '#534AB7',
    chipBg: '#EEEDFE', chipColor: '#3C3489',
    icon: 'ti-users', label: 'Parent / Guardian',
    portalTitle: 'Parent Portal',
    subtitle: "Monitor your child’s progress and results",
    features: [
      ['ti-chart-line',     "View your child’s exam results"],
      ['ti-calendar-event', 'See upcoming exam schedule'],
      ['ti-speakerphone',   'Receive school announcements'],
      ['ti-message',        'Contact teachers directly'],
    ],
    formSub: 'Sign in to your parent account',
    placeholder: 'parent@email.com',
    btnLabel: 'Sign in as Parent',
    accentColor: '#534AB7',
    footerText: 'No account?',
    footerLink: 'Contact the school office',
    footerHref: '#',
    redirect: '/parent/dashboard.html',
  },
};

let activeRole = 'ADMIN';

/* ── Auto-redirect if already signed in ─────────── */
(function checkExisting() {
  const token = sessionStorage.getItem('edu_token');
  const role  = sessionStorage.getItem('edu_role');
  if (token && role && ROLES[role]) window.location.replace(ROLES[role].redirect);
})();

/* ── Switch role ─────────────────────────────────── */
function switchRole(role) {
  if (!ROLES[role]) return;
  activeRole = role;
  const cfg  = ROLES[role];

  document.getElementById('leftPanel').style.background =
    'linear-gradient(145deg, ' + cfg.from + ', ' + cfg.to + ')';

  document.querySelectorAll('.role-card').forEach(c =>
    c.classList.toggle('active', c.dataset.role === role)
  );

  document.getElementById('portalTitle').textContent    = cfg.portalTitle;
  document.getElementById('portalSubtitle').textContent = cfg.subtitle;

  document.getElementById('featureList').innerHTML = cfg.features.map(
    function(f) { return '<li class="feature-item"><i class="ti ' + f[0] + '"></i><span>' + f[1] + '</span></li>'; }
  ).join('');

  const chip = document.getElementById('roleChip');
  chip.style.background = cfg.chipBg;
  chip.style.color       = cfg.chipColor;
  chip.innerHTML = '<i class="ti ' + cfg.icon + '"></i>' + cfg.label;

  document.getElementById('formSubtitle').textContent   = cfg.formSub;
  document.getElementById('emailInput').placeholder     = cfg.placeholder;
  document.getElementById('btnLabel').textContent       = cfg.btnLabel;

  const btn = document.getElementById('submitBtn');
  btn.style.background = 'linear-gradient(135deg, ' + cfg.from + ', ' + cfg.to + ')';

  document.documentElement.style.setProperty('--focus-ring', cfg.accentColor);

  const fl = document.getElementById('forgotLink');
  fl.style.color = cfg.accentColor;

  document.getElementById('footerHint').innerHTML =
    cfg.footerText + ' <a href="' + cfg.footerHref + '" style="color:' + cfg.accentColor + '">'
    + cfg.footerLink + '</a>';

  document.getElementById('passwordInput').value = '';
  clearErrors();
  document.getElementById('emailInput').focus();
}

/* ── Password toggle ─────────────────────────────── */
document.getElementById('togglePass').addEventListener('click', function() {
  var pwd  = document.getElementById('passwordInput');
  var icon = document.getElementById('eyeIcon');
  var show = pwd.type === 'password';
  pwd.type      = show ? 'text' : 'password';
  icon.className = show ? 'ti ti-eye-off' : 'ti ti-eye';
});

/* ── Validation helpers ──────────────────────────── */
function clearErrors() {
  document.getElementById('emailErr').classList.remove('show');
  document.getElementById('passErr').classList.remove('show');
  document.getElementById('errorBanner').classList.remove('show');
  document.getElementById('emailInput').classList.remove('error-field');
  document.getElementById('passwordInput').classList.remove('error-field');
}

function showFieldError(errId, inputId) {
  document.getElementById(errId).classList.add('show');
  document.getElementById(inputId).classList.add('error-field');
}

function showBannerError(msg) {
  var el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('show');
}

function validEmail(v) { return v.indexOf('@') > 0 && v.indexOf('.') > 0; }

/* ── Form submit ─────────────────────────────────── */
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearErrors();

  var email    = document.getElementById('emailInput').value.trim();
  var password = document.getElementById('passwordInput').value;
  var ok = true;

  if (!email || !validEmail(email)) { showFieldError('emailErr', 'emailInput'); ok = false; }
  if (!password)                     { showFieldError('passErr', 'passwordInput'); ok = false; }
  if (!ok) return;

  var btn   = document.getElementById('submitBtn');
  var label = document.getElementById('btnLabel');
  btn.disabled    = true;
  label.innerHTML = '<div class="spinner"></div>Signing in…';

  try {
    var res = await fetch('/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email: email, password: password, role: activeRole }),
    });

    var ct   = res.headers.get('content-type') || '';
    var json = ct.indexOf('application/json') !== -1 ? await res.json() : null;

    if (res.ok && json && json.status === 'success') {
      var d = json.data;
      sessionStorage.setItem('edu_token', d.token   || '');
      sessionStorage.setItem('edu_role',  d.role    || activeRole);
      sessionStorage.setItem('edu_name',  d.name    || '');
      sessionStorage.setItem('edu_email', d.email   || '');

      if (d.role === 'STUDENT' && json.status === 'PASSWORD_CHANGE_REQUIRED') {
        sessionStorage.setItem('edu_temp_token', d.token);
        window.location.href = '/student/change-password.html';
        return;
      }

      window.location.href = (ROLES[d.role] && ROLES[d.role].redirect) || '/';
    } else {
      var msg = (json && (json.message || json.error)) || 'Invalid email or password. Please try again.';
      showBannerError(msg);
    }
  } catch (err) {
    showBannerError('Network error. Please check your connection and try again.');
  } finally {
    btn.disabled      = false;
    label.textContent = ROLES[activeRole].btnLabel;
  }
});

/* Enter on password submits */
document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit', { cancelable: true }));
});

/* ── Init ────────────────────────────────────────── */
switchRole('ADMIN');
</script>
</body>
</html>
