<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EduLearn — Teacher Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F4F6FA; min-height: 100vh; display: flex; flex-direction: column; }
    nav {
      background: linear-gradient(135deg, #085041, #0F6E56);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 15px; font-weight: 800; }
    .brand .ti { font-size: 20px; }
    .nav-right { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.85); font-size: 13px; }
    .logout-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 7px;
      color: #fff; font-size: 12.5px; font-family: inherit;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 5px;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.25); }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .coming-soon { text-align: center; max-width: 480px; }
    .icon-circle {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #E1F5EE, #B2DFDB);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .icon-circle .ti { font-size: 32px; color: #0F6E56; }
    h1 { font-size: 22px; font-weight: 700; color: #1A2236; margin-bottom: 12px; }
    p  { font-size: 14px; color: #64748B; line-height: 1.6; margin-bottom: 8px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px;
      background: #E1F5EE; color: #085041;
      border-radius: 20px; font-size: 12px; font-weight: 600;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <nav>
    <div class="brand"><i class="ti ti-school"></i> EduLearn</div>
    <div class="nav-right">
      <span id="navName"></span>
      <a href="/auth/logout" class="logout-btn" onclick="sessionStorage.clear()">
        <i class="ti ti-logout"></i> Sign out
      </a>
    </div>
  </nav>
  <main>
    <div class="coming-soon">
      <div class="icon-circle"><i class="ti ti-book"></i></div>
      <h1>Teacher Portal</h1>
      <p>Course building, exam creation and student management tools will be available here.</p>
      <p>This portal is currently being built and will be available shortly.</p>
      <span class="badge"><i class="ti ti-clock"></i> Coming soon</span>
    </div>
  </main>
  <script>
    var name = sessionStorage.getItem('edu_name');
    if (name) document.getElementById('navName').textContent = name;
  </script>
</body>
</html>
